server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"  # debug, release, test
  read_timeout: 30s
  write_timeout: 30s

database:
  host: "localhost"
  port: 5432
  username: "kubepilot"
  password: "your_password_here"
  dbname: "kubepilot"
  sslmode: "disable"
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "your_jwt_secret_here"
  expire_time: 24h
  issuer: "kubepilot"

log:
  level: "info"  # debug, info, warn, error
  format: "json"  # json, console
  output: "stdout"  # stdout, file

k8s:
  default_namespace: "default"
  qps: 50.0
  burst: 100
