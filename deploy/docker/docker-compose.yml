version: '3.8'

services:
  kubepilot:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/configs
    depends_on:
      - postgres
      - redis
    environment:
      - KUBEPILOT_DATABASE_HOST=postgres
      - KUBEPILOT_REDIS_HOST=redis
    networks:
      - kubepilot-network

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=kubepilot
      - POSTGRES_PASSWORD=kubepilot
      - POSTGRES_DB=kubepilot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - kubepilot-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - kubepilot-network

  # Optional: Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - kubepilot-network

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - kubepilot-network

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  kubepilot-network:
    driver: bridge
